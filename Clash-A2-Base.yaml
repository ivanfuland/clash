port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
external-controller: 0.0.0.0:9090

geodata-mode: true
geodata-loader: memconservative
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
  asn: "https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb"

proxies: ~
proxy-groups: ~

rule-providers:
  MyAnthropic:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/ivanfuland/clash/refs/heads/main/list/MyAnthropic.list
    path: ./providers/MyAnthropic.yaml
    interval: 86400

  MyOpenAI:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/ivanfuland/clash/refs/heads/main/list/MyOpenAI.list
    path: ./providers/MyOpenAI.yaml
    interval: 86400

  Mine1:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/ivanfuland/clash/refs/heads/main/list/Mine1.list
    path: ./providers/Mine1.yaml
    interval: 86400

rules:
  - RULE-SET,MyAnthropic,👽 Anthropic
  - RULE-SET,MyOpenAI,🤖 OpenAI
  - RULE-SET,Mine1,🌐 国外
  - GEOSITE,anthropic,👽 Anthropic
  - GEOSITE,openai,🤖 OpenAI
  - GEOSITE,category-ai-!cn,🤖 OpenAI
  - GEOSITE,github,💻 编程
  - GEOSITE,docker,💻 编程
  - GEOSITE,npmjs,💻 编程
  - GEOSITE,python,💻 编程
  - GEOSITE,twitter,🐦 社交
  - GEOSITE,instagram,🐦 社交
  - GEOSITE,reddit,🐦 社交
  - GEOSITE,facebook,🥽 Meta
  - GEOSITE,youtube,📺 Youtube
  - GEOSITE,netflix,🎬 Netflix
  - GEOSITE,google,🔍 Google
  - GEOSITE,microsoft,📄 Microsoft
  - GEOSITE,geolocation-!cn,🌐 国外
  - GEOIP,CN,🏠 国内,no-resolve
  - MATCH,🏠 国内
